name: GenLayer Market Create

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  request-genlayer-market:
    runs-on: ubuntu-latest
    steps:
      - name: Request GenLayer market creation
        run: |
          curl --fail-with-body --max-time 70 -X POST "${{ secrets.APP_URL }}/api/agent/request-genlayer-market" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
