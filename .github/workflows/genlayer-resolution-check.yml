name: GenLayer Resolution Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check-genlayer-resolution:
    runs-on: ubuntu-latest
    steps:
      - name: Check GenLayer resolution
        run: |
          curl --fail-with-body --max-time 70 -X POST "${{ secrets.APP_URL }}/api/agent/check-genlayer-resolution" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
